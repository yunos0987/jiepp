name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        preset: [windows-clang-ninja-debug, windows-clang-ninja-release]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install LLVM/Clang
        run: choco install llvm --yes --no-progress

      - name: Install Ninja
        run: choco install ninja --yes --no-progress

      - name: Install Flex/Bison
        run: choco install winflexbison3 --yes --no-progress

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/vcpkg_installed
          key: vcpkg-${{ matrix.preset }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ matrix.preset }}-

      - name: Bootstrap vcpkg
        run: .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Build and Test
        run: cmake --workflow --preset ${{ matrix.preset }}

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        preset: [linux-makefiles-debug, linux-makefiles-release]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake make flex bison curl zip unzip tar

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/vcpkg_installed
          key: vcpkg-${{ matrix.preset }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ matrix.preset }}-

      - name: Bootstrap vcpkg
        run: ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Build and Test
        run: cmake --workflow --preset ${{ matrix.preset }}
